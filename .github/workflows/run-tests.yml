name: Run Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['10.*', '11.*', '12.*', '13.*']
        stability: [prefer-stable]
        include:
          - laravel: '10.*'
            testbench: '8.*'
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '13.*'
            testbench: '11.*'
        exclude:
          - laravel: '10.*'
            php: '8.4'
          - laravel: '10.*'
            php: '8.5'
          - laravel: '11.*'
            php: '8.5'
          - laravel: '12.*'
            php: '8.5'
          - laravel: '13.*'
            php: '8.2'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Install dependencies
        run: |
          composer require "orchestra/testbench:${{ matrix.testbench }}" \
                           --no-interaction --no-update
          composer update --no-interaction --prefer-dist --${{ matrix.stability }}

      - name: Run tests
        run: ./vendor/bin/pest

  all-tests-passed:
    name: All Tests Passed
    needs: [test]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check matrix result
        env:
          RESULT: ${{ needs.test.result }}
        run: |
          if [ "$RESULT" != "success" ]; then
            exit 1
          fi
