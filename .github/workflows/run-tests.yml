name: Run Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [10, 11, 12]
        exclude:
          - php: 8.2
            laravel: 12  # Laravel 12 requires PHP 8.3+

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Install dependencies
        run: |
          composer require "illuminate/support:^${{ matrix.laravel }}.0" \
                           "illuminate/routing:^${{ matrix.laravel }}.0" \
                           "illuminate/http:^${{ matrix.laravel }}.0" \
                           "illuminate/console:^${{ matrix.laravel }}.0" \
                           "illuminate/filesystem:^${{ matrix.laravel }}.0" \
                           "illuminate/cache:^${{ matrix.laravel }}.0" \
                           --no-interaction --no-update
          composer update --no-interaction --prefer-dist --prefer-stable

      - name: Run tests
        run: ./vendor/bin/pest

  all-tests-passed:
    name: All Tests Passed
    needs: [ test ]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check matrix result
        env:
          RESULT: ${{ needs.test.result }}
        run: |
          if [ "$RESULT" != "success" ]; then
            exit 1
          fi
